<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-x1-7">
                <div class="form-container-custom">
                    <!--Encabezado -->
                    <div style="justify-content: center;">
                    <img src="welcome.png" alt="imagen bienvenida">
                    </div>
                    <!--Descripcion corta-->
                    <p class="text-center text-muted mb-5">
                        Completa de manera correcta los datos solicitados. La validacion se llevara a cabo al enviar.
                    </p>
                    <form action="/submit-data" method="POST" class="row g-3">
                        <!--Campo para nombre-->
                        <div class="col-md-6">
                            <!--Etiqueta del campo-->
                            <label for="inputNombre" class="form-label fw-semibold">Nombre<span>*</span></label>
                            <input type="text" class="form-control form-control-lg" id="inputNombre" name="nombre" placeholder="Coloque su nombre" required>
                            <div class="invalid-feedback">Por favor, ingrese su nombre.
                            </div>
                        </div>
                        <!--Campo para apelldos-->
                        <div class="col-md-6">
                            <!--Etiqueta del campo-->
                            <label for="inputApellido" class="form-label fw-semibold"> Apellido <span>*</span></label>
                            <input type="text" class="form-control form-control-lg" id="inputApellido" name="apellido" placeholder="Coloque su apellido" required>
                            <div class="invalid-feedback">Por favor ingrese su apellido.
                            </div>
                        </div>
                        <!--Campo para Correo Electronico-->
                        <div class="col-md-6">
                            <!--Etiqueta correo electronico-->
                            <label for="inputEmail" class="form-label fw-semibold">Correo Electronico <span>*</span></label>
                            <input type="email" class="form-control form-control-lg" id="inputEmail" name="email" placeholder="ejemplo@dominio.com" required>
                            <div class="form-text">Usuaremos este correo para conmtactarte.
                            </div>
                        </div>
                        <!--Campo para contraseña-->
                        <div class="col-md-6">
                            <label for="inputPassword" class="form-label fw-semibold">Contraseña <span>*</span></label>
                            <input type="password" class="form-control form-control-lg" name="password" minlength="8"  id="inputPassword" required>
                            <div class="form-text">Minimo de 8 caracteres.
                            </div>
                        </div>
                        <!--Lista desplegable select-->
                        <div class="col-12">
                            <label for="selectArea" class="form-label fw-semibold">
                                Seleccione tu nombre de usuario
                            </label>
                            <select class="form-select form-select-lg" name="area" id="selectArea" aria-label="Seleccione su area">
                                <!--Colocamos opciones por defecto-->
                                <option selected value="">Seleccione una opción</option>
                                <option selected value="desarrollo">Desarrollo</option>
                                <option selected alue="tester">Tester</option>
                                <option selected value="analista">Analista</option>
                                <option selected value="marketing">Marketing</option>
                            </select>
                        </div>
                        <!--Campo de texto multilineas-->
                        <div class="col-12">
                            <label for="textareaComentarios" class="form-label fw-semibold">Deja tu comentario</label>
                            <textarea class="form-control form-control-lg" name="comentarios" id="textareaComentarios" rows="3" placeholder="Describe brevemente tu idea....">
                            </textarea>
                        </div>
                        <!--Grupo de botones de seleccion-->
                        <div class="col-12 mb-3">
                            <p class="form-label fw-semibold mb-2">Preferencias de contacto</p>

                            <!--opcion 1-->
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="contacto" id="radioEmail" value="email" checked >
                                <label class="form-check-label" for="radioEmail">Email</label>
                            </div>
                            <!--opcion 2-->
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="contacto" id="radioTelefono" value="telefono" checked >
                                <label class="form-check-label" for="radioTelefono">Tel&eacute;fono</label>
                            </div>
                        </div>
                        <!--Casilla de verificacion-->
                        <div class="col-12">
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" name="terminos" value="aceptado" id="checkTerminos" required>
                                <label class="form-check-label" for="checkTerminos">Acepto los
                                    <!--Enlace simulado a los terminos y condiciones-->
                                    <a href="#" class="text-decoration-none text-primary fw-medium">Terminos y condiones</a>
                                    <span class="text-danger">*</span>
                                </label>
                                <!--Mensaje de error sio no e marca-->
                                <div class="invalid-feedback">
                                    Debes aceptar para continuar
                                </div>
                            </div>
                        </div>
                        <!--Botones de acciones-->
                        <div class="col-12 d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="reset" class="btn btn-outline-secondary btn-custom">Limpiar campos</button>
                            <button type="submit" class="btn btn-primary btn-custom">Enviar formulario</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
